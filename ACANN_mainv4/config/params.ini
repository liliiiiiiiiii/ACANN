; 每批在 GPU 处理的样本数。
; 6GB 显卡 + nb_omega1/2=1024 时推荐 100~200；
; nb_omega1/2=256 时可设 500~1000。
batch_size = 1000
; memmap 预分配总条数（决定磁盘占用）。
; 磁盘占用 = n_total × nb_omega1 × nb_omega2 × 4 字节
; 例：n_total=5000, 1024×1024 → 20 GB；256×256 → 1.25 GB
; 不设置时默认等于 nb_data（即本次运行量）。

